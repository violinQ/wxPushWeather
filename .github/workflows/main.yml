name: wx天气预报推送

on:
  schedule:
    # 北京时间 08:00
    - cron: '0 0 * * *'
    # 北京时间 23:45
    - cron: '45 15 * * *'

  workflow_dispatch:
    inputs:
      mode:
        description: "选择推送模式"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - day
          - night

      user_ids:
        description: "指定推送用户（分号分隔，不填则使用默认）"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  weather:
    runs-on: ubuntu-latest
    name: Weather Push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ⭐ 手动触发才设置 MODE
      - name: Set MODE (manual only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV

      # ⭐ 手动触发覆盖 USER_IDS（测试用）
      - name: Override USER_IDS (manual only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.user_ids != ''
        run: |
          echo "USER_IDS=${{ github.event.inputs.user_ids }}" >> $GITHUB_ENV

      - name: Debug
        run: |
          echo "MODE is $MODE"
          echo "USER_IDS is $USER_IDS"

      - name: Run script
        run: python main.py

    env:
      APP_ID: ${{ secrets.APP_ID }}
      APP_SECRET: ${{ secrets.APP_SECRET }}
      TEMPLATE_ID_DAY: ${{ secrets.TEMPLATE_ID_DAY }}
      TEMPLATE_ID_NIGHT: ${{ secrets.TEMPLATE_ID_NIGHT }}
      USER_IDS: ${{ secrets.USER_IDS }}
      START_DATE: ${{ secrets.START_DATE }}
      BIRTHDAY: ${{ secrets.BIRTHDAY }}
      CITY: ${{ secrets.CITY }}
      QWEATHER_HOST: ${{ secrets.QWEATHER_HOST }}
      QWEATHER_KID: ${{ secrets.QWEATHER_KID }}
      QWEATHER_PRIVATE_KEY: ${{ secrets.QWEATHER_PRIVATE_KEY }}
      QWEATHER_PROJECT_ID: ${{ secrets.QWEATHER_PROJECT_ID }}
