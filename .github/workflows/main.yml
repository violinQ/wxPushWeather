name: wx天气预报推送

on:
  schedule:
    # 早上 8 点 (UTC 时间 0 点)
    - cron: '0 0 * * *'
    # 晚上 24 点 (UTC 时间 16 点)
    - cron: '59 15 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Say hello to your girlfriend every day

    steps:
    - name: checkout
      uses: actions/checkout@v3
      with:
        ref: main

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install pip
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run weather
      run: |
        python main.py

    env:
      APP_ID: ${{ secrets.APP_ID }}
      APP_SECRET: ${{ secrets.APP_SECRET }}
      TEMPLATE_ID_DAY: ${{ secrets.TEMPLATE_ID_DAY }}
      TEMPLATE_ID_NIGHT: ${{ secrets.TEMPLATE_ID_NIGHT }}
      USER_IDS: ${{ secrets.USER_IDS }}
      START_DATE: ${{ secrets.START_DATE }}
      BIRTHDAY: ${{ secrets.BIRTHDAY }}
      CITY: ${{ secrets.CITY }}
      QWEATHER_HOST: ${{ secrets.QWEATHER_HOST }}
      QWEATHER_KID: ${{ secrets.QWEATHER_KID }}
      QWEATHER_PRIVATE_KEY: ${{ secrets.QWEATHER_PRIVATE_KEY }}
      QWEATHER_PROJECT_ID: ${{ secrets.QWEATHER_PROJECT_ID }}
