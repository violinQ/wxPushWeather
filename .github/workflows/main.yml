name: wx天气预报推送

on:
  schedule:
    # 北京时间 08:00（UTC 00:00）
    - cron: '0 0 * * *'
    # 北京时间 00:00（UTC 16:00）
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: "选择推送模式"
        required: true
        default: "day"
        type: choice
        options:
          - day
          - night

permissions:
  contents: read

jobs:
  weather:
    runs-on: ubuntu-latest
    name: Weather Push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Set MODE
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 16 * * *" ]; then
            echo "MODE=night" >> $GITHUB_ENV
          else
            echo "MODE=day" >> $GITHUB_ENV

      - name: Run script
        run: python main.py

    env:
      APP_ID: ${{ secrets.APP_ID }}
      APP_SECRET: ${{ secrets.APP_SECRET }}
      TEMPLATE_ID_DAY: ${{ secrets.TEMPLATE_ID_DAY }}
      TEMPLATE_ID_NIGHT: ${{ secrets.TEMPLATE_ID_NIGHT }}
      USER_IDS: ${{ secrets.USER_IDS }}
      START_DATE: ${{ secrets.START_DATE }}
      BIRTHDAY: ${{ secrets.BIRTHDAY }}
      CITY: ${{ secrets.CITY }}
      QWEATHER_HOST: ${{ secrets.QWEATHER_HOST }}
      QWEATHER_KID: ${{ secrets.QWEATHER_KID }}
      QWEATHER_PRIVATE_KEY: ${{ secrets.QWEATHER_PRIVATE_KEY }}
      QWEATHER_PROJECT_ID: ${{ secrets.QWEATHER_PROJECT_ID }}
